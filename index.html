<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顶层代码雨悬浮头像上方</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 闪烁星星层 */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 4px #ffffff;
            animation: twinkle 2.5s infinite ease-in-out;
        }

        .star.small {
            width: 1px;
            height: 1px;
            box-shadow: 0 0 2px #ffffff;
        }

        .star.bright {
            width: 3px;
            height: 3px;
            background: #ffd700;
            box-shadow: 0 0 6px #ffd700;
        }

        /* 代码雨：最高层级 */
        #matrixCanvas {
            position: fixed;
            inset: 0;
            z-index: 999;
            opacity: 0.65;
            pointer-events: none;
        }

        /* 圆形头像容器 */
        .circle-box {
            position: relative;
            width: 80vmin;
            max-width: 800px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            overflow: hidden;
            z-index: 10;
        }

        /* 头像图片动画流程：入场滑入 → 扇形走完瞬间消失 → 由暗到亮缓缓浮现 */
        .circle-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(1.2) sepia(1) hue-rotate(210deg) saturate(2);
            position: relative;
            z-index: 2;
            animation: imgFullAnim 10s linear forwards;
        }

        /* 黑色扇形遮罩：6秒完整轮转一圈，结束永久消失 */
        .sector {
            position: absolute;
            inset: 0;
            clip-path: polygon(50% 50%, 100% 0, 100% 100%);
            background: #000;
            animation: singleShow 6s linear forwards;
            transition: all 0.1s ease;
            z-index: 3;
        }

        /* 扇形轮转动画 */
        @keyframes singleShow {
            0%    { background: #000; }
            15%   { background: transparent; }
            85%   { background: transparent; }
            99.9% { background: #000; }
            100%  { background: transparent; opacity: 0; }
        }

        /* 图片完整动画时序 */
        /* 0~1.2s：头像从上方滑入显示；1.2~6s：完整显示配合扇形轮转；
           6s瞬间完全消失；6~10s 由暗到亮慢慢浮现出来 */
        @keyframes imgFullAnim {
            0% {
                opacity: 0;
                transform: translateY(-60%);
                filter: brightness(1.8) sepia(1) hue-rotate(210deg) saturate(2);
            }
            30% {
                opacity: 0.6;
                transform: translateY(-30%);
                filter: brightness(1.4) sepia(1) hue-rotate(210deg) saturate(2);
            }
            60% {
                opacity: 0.9;
                transform: translateY(-8%);
                filter: brightness(1.6) sepia(1) hue-rotate(210deg) saturate(2);
            }
            12% {
                opacity: 1;
                transform: translateY(0);
                filter: brightness(1.2) sepia(1) hue-rotate(210deg) saturate(2);
            }
            60% {
                opacity: 1;
                transform: translateY(0);
                filter: brightness(1.2) sepia(1) hue-rotate(210deg) saturate(2);
            }
            60.1% {
                opacity: 0;
                filter: brightness(0.1) sepia(1) hue-rotate(210deg) saturate(2);
            }
            100% {
                opacity: 1;
                filter: brightness(1.2) sepia(1) hue-rotate(210deg) saturate(2);
            }
        }

        /* 12等分扇形角度与轮播延迟 */
        .s1  { transform: rotate(0deg);    animation-delay: 0.0s; }
        .s2  { transform: rotate(30deg);   animation-delay: 0.5s; }
        .s3  { transform: rotate(60deg);   animation-delay: 1.0s; }
        .s4  { transform: rotate(90deg);   animation-delay: 1.5s; }
        .s5  { transform: rotate(120deg);  animation-delay: 2.0s; }
        .s6  { transform: rotate(150deg);  animation-delay: 2.5s; }
        .s7  { transform: rotate(180deg);  animation-delay: 3.0s; }
        .s8  { transform: rotate(210deg);  animation-delay: 3.5s; }
        .s9  { transform: rotate(240deg);  animation-delay: 4.0s; }
        .s10 { transform: rotate(270deg);  animation-delay: 4.5s; }
        .s11 { transform: rotate(300deg);  animation-delay: 5.0s; }
        .s12 { transform: rotate(330deg);  animation-delay: 5.5s; }

        /* 星星闪烁 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 闪烁星星 -->
    <div class="stars">
        <div class="star small" style="top: 8%; left: 12%; animation-delay: 0s;"></div>
        <div class="star" style="top: 15%; left: 30%; animation-delay: 0.5s;"></div>
        <div class="star bright" style="top: 22%; left: 70%; animation-delay: 1s;"></div>
        <div class="star small" style="top: 35%; left: 88%; animation-delay: 1.5s;"></div>
        <div class="star" style="top: 45%; left: 20%; animation-delay: 0.3s;"></div>
        <div class="star small" style="top: 55%; left: 80%; animation-delay: 0.8s;"></div>
        <div class="star bright" style="top: 68%; left: 42%; animation-delay: 1.2s;"></div>
        <div class="star" style="top: 78%; left: 10%; animation-delay: 0.6s;"></div>
        <div class="star small" style="top: 86%; left: 65%; animation-delay: 1.8s;"></div>
        <div class="star" style="top: 92%; left: 28%; animation-delay: 2.2s;"></div>
    </div>

    <!-- 代码雨 -->
    <canvas id="matrixCanvas"></canvas>

    <!-- 头像与扇形遮罩 -->
    <div class="circle-box">
        <img src="face.jpg" alt="蓝色线稿头像">
        <div class="sector s1"></div>
        <div class="sector s2"></div>
        <div class="sector s3"></div>
        <div class="sector s4"></div>
        <div class="sector s5"></div>
        <div class="sector s6"></div>
        <div class="sector s7"></div>
        <div class="sector s8"></div>
        <div class="sector s9"></div>
        <div class="sector s10"></div>
        <div class="sector s11"></div>
        <div class="sector s12"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let columns, drops = [];
        const fontSize = 16;
        const chars = "abcdjfgsagjdsljg";

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(0).map(() => Math.random() * canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawContinuousRain() {
            ctx.fillStyle = "rgba(0,0,0,0.08)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < columns; i++) {
                let t = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(t, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawContinuousRain);
        }
        drawContinuousRain();
    </script>
</body>
</html>
